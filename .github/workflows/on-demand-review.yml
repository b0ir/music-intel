name: On-Demand AI Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-review:
    name: Gemini Review (on-demand)
    # Only run when someone comments `/review` on a pull request
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      # React to the comment so the requester gets immediate feedback
      - name: Acknowledge trigger
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Review with Gemini and post comment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:      ${{ github.event.issue.number }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, subprocess, sys

          api_key = os.environ.get("GEMINI_API_KEY", "")
          pr_num  = os.environ["PR_NUMBER"]

          if not api_key:
              print("GEMINI_API_KEY not set — skipping AI review")
              sys.exit(0)

          # Fetch PR metadata
          meta_raw = subprocess.run(
              ["gh", "pr", "view", pr_num, "--json", "title,body"],
              capture_output=True, text=True
          ).stdout
          meta     = json.loads(meta_raw) if meta_raw.strip() else {}
          pr_title = meta.get("title", "")
          pr_body  = meta.get("body", "") or ""

          # Get diff (cap at 12 000 chars to stay within token budget)
          diff_raw = subprocess.run(
              ["gh", "pr", "diff", pr_num],
              capture_output=True, text=True
          ).stdout
          diff = diff_raw[:12000]
          if not diff.strip():
              print("Empty diff — skipping AI review")
              sys.exit(0)

          prompt = f"""You are a senior software engineer reviewing a pull request.
          Analyze the diff and provide a concise review covering:
          1. **Summary** — what the PR does
          2. **Bugs / logic errors** — anything that looks broken
          3. **Security concerns** — if any
          4. **Code quality** — notable issues only, skip style nits
          5. **Verdict** — one of: ✅ Looks good | ⚠️ Minor issues | ❌ Needs work

          Be specific and actionable. Format in Markdown.

          **PR Title:** {pr_title}
          **PR Description:** {pr_body}

          **Diff** (may be truncated):
          ```diff
          {diff}
          ```"""

          payload = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.2, "maxOutputTokens": 1024},
          }

          req = urllib.request.Request(
              f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={api_key}",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read())
              review = data["candidates"][0]["content"]["parts"][0]["text"]
          except Exception as e:
              print(f"Gemini API error: {e}")
              sys.exit(0)

          comment = (
              "## Gemini Code Review 🤖\n\n"
              + review
              + "\n\n---\n"
              + "*Triggered on-demand via `/review` · Powered by Gemini 2.0 Flash*"
          )

          subprocess.run(
              ["gh", "pr", "comment", pr_num, "--body", comment],
              check=True
          )
          print("Review comment posted.")
          PYEOF
